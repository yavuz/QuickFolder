    <text x="420" y="378" fill="#8A96A3" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">~/Desktop/work</text>
    <path d="M804 352L814 362L803 373L801 364L792 362L804 352Z" fill="#25A18E"/>

