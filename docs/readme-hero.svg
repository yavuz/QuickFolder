  <circle cx="913" cy="160" r="46" fill="url(#accent)" fill-opacity="0.12"/>
  <circle cx="285" cy="489" r="38" fill="#25A18E" fill-opacity="0.12"/>
  <text x="120" y="570" fill="#52606D" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600">Native macOS - SwiftUI + AppKit - Open source</text>
